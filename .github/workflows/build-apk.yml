name: Construire APK Android

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'style.css'
      - 'app.js'
      - 'words*.js'
      - 'lessons.js'
      - 'phrases-extra.js'
      - 'activities-extra.js'
      - 'icon.svg'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'style.css'
      - 'app.js'
      - 'words*.js'
      - 'lessons.js'
      - 'phrases-extra.js'
      - 'activities-extra.js'
      - 'icon.svg'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Vérifier les fichiers JavaScript
        run: |
          node --check app.js
          node --check words.js
          node --check words-debutant.js
          node --check words-moyen.js
          node --check words-confirme.js
          node --check lessons.js
          node --check phrases-extra.js
          node --check activities-extra.js

      - name: Construire l APK
        working-directory: android
        run: gradle --no-daemon clean assembleDebug

      - name: Publier l APK
        uses: actions/upload-artifact@v4
        with:
          name: Quiz-Anglais-Plus-v3-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
