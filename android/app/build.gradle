plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chasmet.quizanglais'
    compileSdk 35

    defaultConfig {
        applicationId 'com.chasmet.quizanglais'
        minSdk 24
        targetSdk 35
        versionCode 6
        versionName '2.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

def webRoot = rootProject.projectDir.parentFile
tasks.register('syncWebAssets', Copy) {
    from(webRoot) {
        include 'index.html', 'words.js', 'lessons.js', 'icon.svg', 'manifest.webmanifest', 'sw.js'
    }
    into "$projectDir/src/main/assets"
}
preBuild.dependsOn syncWebAssets
